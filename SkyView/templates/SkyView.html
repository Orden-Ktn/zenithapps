{% load static %}

<!DOCTYPE html>
<html lang="fr" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyView</title>
    <link rel="icon" href="{% static 'images/SkyView.png' %}" type="image/x-icon">
    <link rel="stylesheet" href="{% static 'css/SkyView.css' %}">    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
</head>

<body>

<!-- Theme toggle -->
<button class="theme-toggle" onclick="toggleTheme()" aria-label="Changer de thème">
    <svg class="icon-moon" viewBox="0 0 24 24">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
    <svg class="icon-sun" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
</button>

<svg class="compass-deco" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="48" fill="none" stroke="#C9A96E" stroke-width="0.5"/>
    <circle cx="50" cy="50" r="38" fill="none" stroke="#C9A96E" stroke-width="0.3"/>
    <line x1="50" y1="2" x2="50" y2="98" stroke="#C9A96E" stroke-width="0.4"/>
    <line x1="2" y1="50" x2="98" y2="50" stroke="#C9A96E" stroke-width="0.4"/>
    <line x1="15" y1="15" x2="85" y2="85" stroke="#C9A96E" stroke-width="0.2"/>
    <line x1="85" y1="15" x2="15" y2="85" stroke="#C9A96E" stroke-width="0.2"/>
    <polygon points="50,4 53,20 50,24 47,20" fill="#C9A96E"/>
    <polygon points="50,96 53,80 50,76 47,80" fill="#C9A96E" opacity="0.4"/>
    <text x="50" y="11" text-anchor="middle" font-size="5" fill="#C9A96E" font-family="serif">N</text>
</svg>

<div class="page-wrapper">

    <!-- Brand -->
    <header class="brand">
        <p class="brand-eyebrow">Météo &amp; Atmosphère</p>
        <div class="brand-title-row">
            <img src="{% static 'images/SkyView.png' %}" alt="SkyView logo" class="brand-logo">
            <h1 class="brand-title">SkyView</h1>
        </div>
    </header>

    <!-- Search -->
    <form method="GET" class="search-wrapper">
        <div class="search-group">
            <span class="search-icon">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
            </span>
            <input
                type="text"
                name="city"
                class="search-input"
                placeholder="Entrez une ville…"
                autocomplete="off"
            >
            <button type="submit" class="search-btn">Explorer</button>
        </div>
    </form>

    <!-- Weather result -->
    {% if weather %}
    <div class="weather-card">

        <div class="card-header-section">

            <h2 class="city-name">{{ weather.city }}</h2>

            <div class="weather-icon-wrap">
                <img
                    src="https://openweathermap.org/img/wn/{{ weather.icon }}@2x.png"
                    alt="{{ weather.description }}"
                >
            </div>

            <div class="temperature">
                {{ weather.temperature }}<sup>°C</sup>
            </div>

            <p class="weather-description">{{ weather.description }}</p>

        </div>

        <div class="stats-row">

            <div class="stat-item">
                <span class="stat-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a7 7 0 0 1 7 7c0 5.25-7 13-7 13S5 14.25 5 9a7 7 0 0 1 7-7z"/><circle cx="12" cy="9" r="2.5"/>
                    </svg>
                </span>
                <p class="stat-label">Humidité</p>
                <div class="stat-value">{{ weather.humidity }}<span class="stat-unit">%</span></div>
            </div>

            <div class="stat-item">
                <span class="stat-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/>
                    </svg>
                </span>
                <p class="stat-label">Vent</p>
                <div class="stat-value">{{ weather.wind }}<span class="stat-unit">km/h</span></div>
            </div>

        </div>

    </div>
    {% endif %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const html = document.documentElement;

    // Restore saved preference
    const saved = localStorage.getItem('skyview-theme') || 'dark';
    html.setAttribute('data-theme', saved);

    function toggleTheme() {
        const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('skyview-theme', next);
    }
</script>

</body>
</html>
